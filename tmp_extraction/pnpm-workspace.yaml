# Updated to add apps/sierra-estates-realty as a workspace package.
# (The previous version only had '.' as a package; the new structure
# treats the repo root as a thin workspace orchestrator.)
packages:
  - '.'
  - 'apps/*'
  - 'packages/*'
  - 'functions'

onlyBuiltDependencies:
  - '@firebase/util'
  - '@google/genai'
  - core-js
  - esbuild
  - protobufjs
  - sharp
